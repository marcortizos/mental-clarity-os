<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Mental Clarity OS</title>
<link rel="manifest" href="/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Clarity OS">
<meta name="theme-color" content="#0A0812">
<link rel="apple-touch-icon" href="/icons/icon-180.png">
<link rel="icon" href="/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --bg:#0A0812;
    --surface:#130F1E;
    --surface-2:#1A1526;
    --border:#2A2438;
    --border-soft:#221C30;
    --accent:#8B7CF6;
    --accent-dim:#4E4480;
    --accent-glow:#B8A6FF;
    --amber:#E0AE5E;
    --text:#EDE9F7;
    --text-muted:#948DAB;
    --text-faint:#5C5670;
    --mint:#6FDDBB;
    --coral:#E08E5E;
    --radius:10px;
    --font-display:'Space Grotesk',sans-serif;
    --font-body:'Inter',sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    font-size:15px;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    display:flex;
    min-height:100vh;
  }
  ::selection{background:var(--accent-dim);color:#fff;}
  a{color:var(--accent-glow);}

  /* ---------- layout ---------- */
  #sidebar{
    width:220px;
    flex-shrink:0;
    background:var(--surface);
    border-right:1px solid var(--border-soft);
    display:flex;
    flex-direction:column;
    padding:22px 14px;
    position:sticky;
    top:0;
    height:100vh;
  }
  #main{
    flex:1;
    min-width:0;
    padding:40px 48px 80px;
    max-width:920px;
  }
  @media (max-width:860px){
    body{flex-direction:column;}
    #sidebar{width:100%;height:auto;position:relative;flex-direction:row;align-items:center;overflow-x:auto;padding:14px;}
    #sidebar .brand{margin-bottom:0;margin-right:16px;}
    #sidebar nav{flex-direction:row;gap:4px;}
    #sidebar .navlabel{display:none;}
    #main{padding:24px 20px 60px;}
  }

  /* ---------- brand mark ---------- */
  .brand{display:flex;align-items:center;gap:10px;margin-bottom:30px;padding:0 6px;}
  .brand svg{flex-shrink:0;}
  .brand-text{font-family:var(--font-display);font-weight:600;font-size:14.5px;letter-spacing:0.01em;line-height:1.15;}
  .brand-text span{display:block;font-family:var(--font-body);font-weight:400;font-size:10.5px;color:var(--text-faint);letter-spacing:0.08em;text-transform:uppercase;margin-top:2px;}

  nav{display:flex;flex-direction:column;gap:2px;flex:1;}
  .navgroup-label{font-size:10.5px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-faint);padding:16px 10px 6px;font-weight:500;}
  .navgroup-label:first-child{padding-top:4px;}
  .navitem{
    display:flex;align-items:center;gap:10px;
    padding:9px 10px;border-radius:8px;
    color:var(--text-muted);
    cursor:pointer;font-size:13.5px;font-weight:500;
    transition:background .12s, color .12s;
    border:none;background:none;width:100%;text-align:left;font-family:var(--font-body);
  }
  .navitem:hover{background:var(--surface-2);color:var(--text);}
  .navitem.active{background:var(--surface-2);color:var(--text);}
  .navitem.active .navdot{background:var(--accent);}
  .navdot{width:5px;height:5px;border-radius:50%;background:var(--text-faint);flex-shrink:0;}
  .navbadge{margin-left:auto;font-size:10px;background:var(--accent-dim);color:var(--accent-glow);padding:1px 6px;border-radius:20px;font-weight:600;}

  .sidebar-footer{padding:10px;font-size:11px;color:var(--text-faint);line-height:1.5;border-top:1px solid var(--border-soft);margin-top:12px;padding-top:14px;}

  /* ---------- headers ---------- */
  .page-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent-glow);font-weight:600;margin-bottom:8px;}
  .page-title{font-family:var(--font-display);font-size:28px;font-weight:600;letter-spacing:-0.01em;margin-bottom:6px;}
  .page-sub{color:var(--text-muted);font-size:14px;margin-bottom:32px;max-width:520px;}
  .voice{font-style:italic;color:var(--text-muted);font-family:var(--font-body);}

  /* ---------- cards ---------- */
  .card{background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:22px 24px;}
  .card + .card{margin-top:14px;}

  /* ---------- home dashboard ---------- */
  .stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:28px;}
  .stat-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:16px 18px;}
  .stat-label{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;color:var(--text-faint);margin-bottom:8px;font-weight:500;}
  .stat-value{font-family:var(--font-display);font-size:26px;font-weight:600;}
  .stat-value small{font-size:13px;color:var(--text-muted);font-weight:400;font-family:var(--font-body);}

  .today-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
  @media (max-width:600px){.today-row{grid-template-columns:1fr;}}
  .flow-card{background:var(--surface);border:1px solid var(--border-soft);border-radius:12px;padding:20px 22px;cursor:pointer;transition:border-color .12s, transform .12s;}
  .flow-card:hover{border-color:var(--accent-dim);}
  .flow-card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
  .flow-card-title{font-family:var(--font-display);font-weight:600;font-size:16px;}
  .flow-status{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:600;letter-spacing:0.02em;}
  .flow-status.done{background:rgba(111,221,187,0.12);color:var(--mint);}
  .flow-status.pending{background:var(--surface-2);color:var(--text-muted);}
  .flow-card-desc{font-size:12.5px;color:var(--text-muted);}

  /* ---------- check-in flow ---------- */
  .progress-track{position:relative;height:3px;background:var(--border-soft);border-radius:3px;margin-bottom:40px;overflow:visible;}
  .progress-fill{position:absolute;top:0;left:0;height:100%;background:var(--accent);border-radius:3px;transition:width .35s ease;}
  .progress-dot{position:absolute;top:50%;width:9px;height:9px;border-radius:50%;background:var(--accent-glow);transform:translate(-50%,-50%);transition:left .35s ease;box-shadow:0 0 0 4px rgba(139,124,246,0.15);}

  .qcounter{font-size:12px;color:var(--text-faint);font-weight:500;letter-spacing:0.04em;margin-bottom:10px;text-transform:uppercase;}
  .qtext{font-family:var(--font-display);font-size:22px;font-weight:500;line-height:1.4;margin-bottom:22px;max-width:560px;}
  .answer-wrap{position:relative;}
  textarea.answer{
    width:100%;min-height:110px;background:var(--surface);border:1px solid var(--border);
    border-radius:10px;padding:14px 50px 14px 16px;color:var(--text);font-family:var(--font-body);font-size:15px;
    resize:vertical;line-height:1.55;
  }
  .mic-btn{position:absolute;top:10px;right:10px;width:30px;height:30px;border-radius:50%;border:1px solid var(--border);background:var(--surface-2);color:var(--text-faint);display:none;align-items:center;justify-content:center;cursor:pointer;transition:background .12s,color .12s,border-color .12s;}
  .mic-btn:hover{color:var(--accent-glow);border-color:var(--accent-dim);}
  .mic-btn.listening{background:var(--accent-dim);color:var(--accent-glow);border-color:var(--accent);animation:micpulse 1.4s ease-in-out infinite;}
  @keyframes micpulse{0%,100%{box-shadow:0 0 0 0 rgba(139,124,246,0.35);}50%{box-shadow:0 0 0 6px rgba(139,124,246,0);}}
  textarea.answer:focus{outline:none;border-color:var(--accent-dim);}
  textarea.answer::placeholder{color:var(--text-faint);}

  .btnrow{display:flex;gap:10px;margin-top:18px;align-items:center;}
  button.primary{
    background:var(--accent);color:#0A0812;border:none;font-weight:600;font-size:13.5px;
    padding:10px 20px;border-radius:8px;cursor:pointer;font-family:var(--font-body);transition:opacity .12s;
  }
  button.primary:hover{opacity:0.88;}
  button.primary:disabled{opacity:0.4;cursor:not-allowed;}
  button.ghost{
    background:none;color:var(--text-muted);border:1px solid var(--border);font-size:13.5px;font-weight:500;
    padding:10px 16px;border-radius:8px;cursor:pointer;font-family:var(--font-body);transition:all .12s;
  }
  button.ghost:hover{border-color:var(--border-strong,var(--text-faint));color:var(--text);}
  button.ghost:disabled{opacity:0.4;cursor:not-allowed;}
  .thinking{font-size:12.5px;color:var(--accent-glow);font-style:italic;display:flex;align-items:center;gap:8px;}
  .thinking .spin{width:11px;height:11px;border-radius:50%;border:2px solid var(--accent-dim);border-top-color:var(--accent-glow);animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .refined-preview{background:var(--surface-2);border-left:2px solid var(--accent);padding:12px 16px;border-radius:0 8px 8px 0;font-size:14px;margin-top:14px;}
  .refined-preview .lbl{font-size:10.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--accent-glow);font-weight:600;margin-bottom:4px;}

  .complete-wrap{text-align:left;padding:8px 0;}
  .complete-mark{width:44px;height:44px;border-radius:50%;background:var(--surface-2);border:1px solid var(--accent-dim);display:flex;align-items:center;justify-content:center;margin-bottom:18px;}
  .reflection-box{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:10px;padding:18px 20px;margin:18px 0;font-style:italic;color:var(--text);font-size:14.5px;line-height:1.65;}
  .entry-summary{margin-top:20px;}
  .entry-row{display:flex;justify-content:space-between;gap:20px;padding:10px 0;border-bottom:1px solid var(--border-soft);font-size:13.5px;}
  .entry-row:last-child{border-bottom:none;}
  .entry-row .k{color:var(--text-faint);flex-shrink:0;width:150px;}
  .entry-row .v{color:var(--text);text-align:right;}

  /* ---------- locked ---------- */
  .locked-box{text-align:center;padding:50px 20px;color:var(--text-muted);}
  .locked-box .lock-icon{margin-bottom:16px;opacity:0.5;}
  .locked-progress{display:flex;gap:6px;justify-content:center;margin:18px 0 6px;}
  .locked-progress span{width:26px;height:4px;border-radius:3px;background:var(--border);}
  .locked-progress span.filled{background:var(--accent);}

  /* ---------- history table ---------- */
  .filter-row{display:flex;gap:8px;margin-bottom:20px;}
  .filter-btn{background:var(--surface);border:1px solid var(--border-soft);color:var(--text-muted);font-size:12.5px;font-weight:500;padding:7px 14px;border-radius:20px;cursor:pointer;font-family:var(--font-body);}
  .filter-btn.active{background:var(--accent-dim);color:var(--accent-glow);border-color:var(--accent-dim);}
  table.history{width:100%;border-collapse:collapse;font-size:13px;}
  table.history th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-faint);font-weight:500;padding:0 14px 10px 0;border-bottom:1px solid var(--border-soft);}
  table.history td{padding:12px 14px 12px 0;border-bottom:1px solid var(--border-soft);vertical-align:top;color:var(--text-muted);}
  table.history td.date{color:var(--text);font-weight:500;white-space:nowrap;}
  table.history tr:last-child td{border-bottom:none;}
  .type-pill{font-size:10.5px;padding:2px 8px;border-radius:20px;font-weight:600;white-space:nowrap;}
  .type-pill.morning{background:rgba(224,174,94,0.12);color:var(--amber);}
  .type-pill.evening{background:rgba(139,124,246,0.15);color:var(--accent-glow);}
  .type-pill.weekly{background:rgba(111,221,187,0.12);color:var(--mint);}
  .type-pill.monthly{background:rgba(224,142,94,0.12);color:var(--coral);}
  .empty-state{padding:50px 10px;text-align:center;color:var(--text-faint);font-size:13.5px;}

  /* ---------- vision / rules ---------- */
  .field-label{font-size:11.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-faint);font-weight:500;margin-bottom:8px;margin-top:22px;}
  .field-label:first-child{margin-top:0;}
  input.field, textarea.field{
    width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;
    padding:10px 13px;color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.5;
  }
  textarea.field{min-height:70px;resize:vertical;}
  input.field:focus, textarea.field:focus{outline:none;border-color:var(--accent-dim);}
  .identity-line{font-family:var(--font-display);font-size:18px;font-weight:500;color:var(--accent-glow);margin-top:6px;font-style:italic;}

  .rule-group-title{font-family:var(--font-display);font-size:15px;font-weight:600;margin-bottom:12px;margin-top:24px;}
  .rule-group-title:first-child{margin-top:0;}
  .rule-list{list-style:none;}
  .rule-list li{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border-soft);font-size:13.5px;color:var(--text-muted);}
  .rule-list li:last-child{border-bottom:none;}
  .rule-list li::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--accent-dim);margin-top:7px;flex-shrink:0;}

  .standards-note{font-style:italic;color:var(--text-muted);font-size:13.5px;line-height:1.7;padding:18px 20px;background:var(--surface-2);border-radius:10px;margin-bottom:20px;}

  /* ---------- notes ---------- */
  .note-item{padding:14px 0;border-bottom:1px solid var(--border-soft);}
  .note-item:last-child{border-bottom:none;}
  .note-date{font-size:11px;color:var(--text-faint);margin-bottom:5px;font-weight:500;}
  .note-text{font-size:14px;color:var(--text);white-space:pre-wrap;}
  .note-del{background:none;border:none;color:var(--text-faint);font-size:11px;cursor:pointer;margin-top:6px;font-family:var(--font-body);}
  .note-del:hover{color:var(--text-muted);}

  /* ---------- settings ---------- */
  .settings-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border-soft);}
  .settings-row:last-child{border-bottom:none;}
  .settings-label{font-size:13.5px;color:var(--text);font-weight:500;}
  .settings-hint{font-size:12px;color:var(--text-faint);margin-top:3px;}
  input[type=time]{background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-family:var(--font-body);font-size:13px;}
  .toggle{width:38px;height:22px;border-radius:20px;background:var(--border);position:relative;cursor:pointer;flex-shrink:0;transition:background .15s;}
  .toggle.on{background:var(--accent-dim);}
  .toggle .knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--text-faint);transition:left .15s, background .15s;}
  .toggle.on .knob{left:18px;background:var(--accent-glow);}

  .footnote{font-size:11.5px;color:var(--text-faint);margin-top:8px;line-height:1.5;}

  /* ---------- onboarding ---------- */
  #onboardWrap{max-width:520px;margin:0 auto;padding-top:min(14vh,120px);}
  .ob-dots{display:flex;gap:6px;margin-bottom:34px;}
  .ob-dots span{width:22px;height:3px;border-radius:3px;background:var(--border);}
  .ob-dots span.on{background:var(--accent);}
  .ob-eyebrow{font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--accent-glow);font-weight:600;margin-bottom:10px;}
  .ob-title{font-family:var(--font-display);font-size:26px;font-weight:600;letter-spacing:-0.01em;margin-bottom:18px;line-height:1.25;}
  .ob-body{font-size:15px;color:var(--text-muted);line-height:1.7;margin-bottom:34px;max-width:440px;}
  .ob-body strong{color:var(--text);font-weight:500;}

  /* ---------- then vs now ---------- */
  .compare-head-row{display:grid;grid-template-columns:140px 1fr 1fr;gap:16px;margin-bottom:4px;}
  .compare-head{font-size:11px;text-transform:uppercase;letter-spacing:0.06em;font-weight:600;padding-bottom:10px;border-bottom:1px solid var(--border-soft);}
  .compare-head.then{color:var(--text-faint);}
  .compare-head.now{color:var(--accent-glow);}
  .compare-row{display:grid;grid-template-columns:140px 1fr 1fr;gap:16px;padding:14px 0;border-bottom:1px solid var(--border-soft);}
  .compare-row:last-child{border-bottom:none;}
  .compare-label{font-size:12px;color:var(--text-faint);padding-top:2px;}
  .compare-val{font-size:14px;line-height:1.5;color:var(--text-muted);}
  .compare-val.now{color:var(--text);}
  .shift-box{background:var(--surface-2);border:1px solid var(--border-soft);border-radius:10px;padding:18px 20px;margin-top:26px;font-style:italic;color:var(--text);font-size:14.5px;line-height:1.65;}

  /* ---------- tracked checklist ---------- */
  .tracked-list li{display:flex;align-items:center;gap:12px;}
  .tracked-list li::before{display:none;}
  .tracked-row:hover{color:var(--text);}
  .tracked-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .12s, border-color .12s;}
  .tracked-check.done{background:var(--accent);border-color:var(--accent);}

  /* ---------- auth screen ---------- */
  #authWrap{max-width:380px;margin:0 auto;padding-top:min(16vh,140px);}
  .auth-brand{display:flex;align-items:center;gap:10px;margin-bottom:44px;}
  .auth-title{font-family:var(--font-display);font-size:24px;font-weight:600;margin-bottom:8px;}
  .auth-sub{color:var(--text-muted);font-size:14px;margin-bottom:30px;}
  .auth-field-label{font-size:11.5px;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-faint);font-weight:500;margin-bottom:8px;margin-top:18px;}
  .auth-field-label:first-of-type{margin-top:0;}
  input.auth-input{width:100%;background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:11px 13px;color:var(--text);font-family:var(--font-body);font-size:14px;}
  input.auth-input:focus{outline:none;border-color:var(--accent-dim);}
  .auth-error{color:#F0B8C4;font-size:12.5px;margin-top:14px;}
  .auth-toggle{margin-top:22px;font-size:13px;color:var(--text-muted);}
  .auth-toggle button{background:none;border:none;color:var(--accent-glow);cursor:pointer;font-family:var(--font-body);font-size:13px;padding:0;text-decoration:underline;}
  #authBtn{width:100%;margin-top:22px;justify-content:center;display:flex;}
</style>
</head>
<body>

<div id="sidebar">
  <div class="brand">
    <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
      <path d="M3 20C7 20 8 6 13 6C17 6 15 16 19 16C21.5 16 22 12 22 12" stroke="#8B7CF6" stroke-width="1.6" stroke-linecap="round" fill="none"/>
      <circle cx="22" cy="12" r="2.4" fill="#B8A6FF"/>
    </svg>
    <div class="brand-text">Mental Clarity<span>Operating System</span></div>
  </div>
  <nav id="nav"></nav>
  <div class="sidebar-footer">Structure over willpower.<br>Consistency over intensity.</div>
</div>

<div id="main"></div>

<script>
/* ============================= CONFIG ============================= */
const PERSONA_PROMPT = `You are my Mental Discipline & Clarity OS.

Your role:
- Remove mental noise
- Enforce clarity over emotion
- Replace motivation with structure
- Anchor my thinking in long-term direction

Tone:
- Calm
- Direct
- Grounded
- No hype

Rules:
- Ask fewer questions, but sharper ones
- If I'm vague, force precision
- Always reduce complexity

Goal:
Turn me into a clear, disciplined, consistent operator.`;

const FLOWS = {
  morning: {
    label:'Morning check-in', short:'Morning', color:'morning',
    desc:'3 minutes. Set the standard before the day sets it for you.',
    questions:[
      {key:'clutter', label:'Mental clutter', q:'What mental clutter am I carrying into today?'},
      {key:'mustDo', label:'Must-do today', q:'What must be done today regardless of mood?'},
      {key:'priority', label:'Top priority', q:'What is the single priority that moves my life forward?'},
      {key:'standard', label:'Standard today', q:'What standard am I holding myself to today?'},
      {key:'intention', label:'Intention', q:"Summarize today's intention in one clear sentence."}
    ]
  },
  evening: {
    label:'Evening review', short:'Evening', color:'evening',
    desc:'3 minutes. Close the day clean.',
    questions:[
      {key:'executed', label:'Executed well', q:'What did I execute well today?'},
      {key:'avoided', label:'Avoided discomfort', q:'Where did I lack discipline or avoid discomfort?'},
      {key:'correction', label:'Correction for tomorrow', q:'What is one correction for tomorrow?'},
      {key:'reinforcement', label:'Reinforcement', q:'Reinforce consistency over emotion in one sentence.'}
    ]
  },
  weekly: {
    label:'Weekly review', short:'Weekly', color:'weekly',

function todayISO(d=new Date()){ return d.toISOString().slice(0,10); }
function mondayOf(d=new Date()){
  const dt = new Date(d);
  const day = (dt.getDay()+6)%7; // 0=Mon
  dt.setDate(dt.getDate()-day);
  return todayISO(dt);
}
function fmtDate(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
function fmtDateShort(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}
function monthKeyOf(d=new Date()){
  return d.toISOString().slice(0,7)+'-01';
}
function fmtMonth(iso){
  const d = new Date(iso+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'long', year:'numeric'});
}

async function supabaseWriteWithRetry(column, value, attempts=3){
  let lastErr = null;
  for(let i=0;i<attempts;i++){
    try{
      const { error } = await supabaseClient
        .from('user_data')
        .update({ [column]: value })
        .eq('user_id', currentUser.id);
      if(error) throw error;
      return true;
    }catch(e){
      lastErr = e;
      await new Promise(r=>setTimeout(r, 400 * (i+1)));
    }
  }
  console.error('supabase write failed after retries', column, lastErr);
  return false;
}

/* ============================= CLAUDE API (via backend proxy) ============================= */
async function callClaude(system, userMsg){
  const res = await fetch('/api/claude',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      max_tokens:300,
      system: system,
      messages:[{role:'user', content: userMsg}]
    })
  });
  const data = await res.json();
  const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
  return text;
}
async function refineAnswer(question, raw){
  if(!raw || !raw.trim()) return raw;
  const sys = PERSONA_PROMPT + `

Task: The user just answered a check-in question. Respond ONLY with strict JSON and nothing else — no markdown fences, no preamble: {"refined": "..."}. Turn their raw answer into one tight, concrete one-line entry, under 20 words, written in this OS's calm, direct, no-hype voice, in first person. Do not add advice or commentary. Just crystallize what they said.`;
  const msg = `Question: ${question}\nRaw answer: ${raw}`;
  try{
    let text = await callClaude(sys, msg);
    text = text.replace(/```json|```/g,'').trim();
    const parsed = JSON.parse(text);
    return parsed.refined || raw.trim();
  }catch(e){
    return raw.trim();
  }
}
async function getReflection(flowLabel, qaPairs){
  const sys = PERSONA_PROMPT + `

Task: The user just completed their ${flowLabel}. Respond with a short, grounded reflection — 2 to 3 sentences, plain text, no markdown, no headers, no bullet points, first-person-plural or direct address ("you"). Calm, direct, no hype, no therapy language. Anchor them in structure over emotion.`;
  const msg = qaPairs.map(p=>`${p.q}\n${p.a}`).join('\n\n');
  try{
    return (await callClaude(sys, msg)).trim();
  }catch(e){
    return 'Logged. Consistency is the only metric that matters — show up again tomorrow.';
  }
}

function weekCheckinCount(weekMonday){
  const days = new Set();
  Object.keys(checkinsData).forEach(k=>{
    const [type,date] = k.split(':');
    if(type==='weekly' || type==='monthly') return;
    if(mondayOf(new Date(date+'T00:00:00')) === weekMonday) days.add(date);
  });
  return days.size;
}
function isWeeklyUnlocked(weekMonday){
  return weekCheckinCount(weekMonday) >= 5;
}
function weeklyCountForMonth(monthKey){
  const ym = monthKey.slice(0,7);
  let count = 0;
  Object.keys(checkinsData).forEach(k=>{
    const [type,date] = k.split(':');
    if(type==='weekly' && date && date.slice(0,7)===ym) count++;
  });
  return count;
}
function isMonthlyUnlocked(monthKey){
  return weeklyCountForMonth(monthKey) >= 4;
}
function computeStreak(){
  let streak = 0;
  let d = new Date();
  while(true){
    const iso = todayISO(d);
    const m = checkinsData['morning:'+iso], e = checkinsData['evening:'+iso];
    if(m && e){ streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

let flowState = {}; // { flow, index, answers:{key:{raw,refined}}, saving, phase }

function renderCheckinFlow(main, flowKey, weeklyDate=null){
  const flow = FLOWS[flowKey];
  const dateKey = weeklyDate || todayISO();
  const showDomains = appConfig.settings.domainsEnabled && (flowKey==='morning' || flowKey==='evening');
  const priorDomain = (flowState.flowKey===flowKey && flowState.dateKey===dateKey) ? flowState.domain : null;
  const domain = showDomains ? (priorDomain || 'personal') : 'personal';
  const storageKey = flowKey+':'+dateKey + (domain==='business' ? ':business' : '');
  const existing = checkinsData[storageKey];

  if(!flowState.flow || flowState.flow!==storageKey){
    flowState = { flow: storageKey, flowKey, dateKey, domain, index:0, answers:{}, saving:false, phase: existing ? 'complete' : 'asking', reflection: existing ? existing._reflection : null };
  }

  if(existing && flowState.phase==='complete'){
    renderCompleteView(main, flow, flowKey, existing);
    return;
  }

  const q = flow.questions[flowState.index];
  const total = flow.questions.length;
  const pct = (flowState.index / total) * 100;

  const periodLabel = flowKey==='monthly' ? fmtMonth(dateKey) : (weeklyDate ? 'week of '+fmtDateShort(weeklyDate) : fmtDate(dateKey));
  const domainPills = showDomains ? `
    <div style="display:flex;gap:8px;margin-bottom:20px;">
      <button class="filter-btn domain-pill ${flowState.domain==='personal'?'active':''}" data-d="personal">Personal</button>
      <button class="filter-btn domain-pill ${flowState.domain==='business'?'active':''}" data-d="business">Business</button>
    </div>` : '';

  main.innerHTML = `
    <div class="page-eyebrow">${flow.label}</div>
    <div class="page-title">${periodLabel}</div>
    <div class="page-sub voice">${flow.desc}</div>
    ${domainPills}

    <div class="progress-track">
      <div class="progress-fill" style="width:${pct}%"></div>
      <div class="progress-dot" style="left:${pct}%"></div>
    </div>

    <div class="qcounter">Question ${flowState.index+1} of ${total}</div>
    <div class="qtext">${q.q}</div>
    <div class="answer-wrap">
      <textarea class="answer" id="answerInput" placeholder="Answer in one or two sentences...">${flowState.answers[q.key]?.raw || ''}</textarea>
      <button class="mic-btn" id="micBtn" type="button" title="Voice input" style="display:none;">
        <svg width="15" height="15" viewBox="0 0 20 20" fill="none"><path d="M10 2.5a2.8 2.8 0 012.8 2.8v4.4a2.8 2.8 0 01-5.6 0V5.3A2.8 2.8 0 0110 2.5z" fill="currentColor"/><path d="M5.5 9.5a4.5 4.5 0 009 0M10 14v3.5M7 17.5h6" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="btnrow" id="btnrow">
      <button class="primary" id="nextBtn">${flowState.index===total-1 ? 'Finish' : 'Next'}</button>
      ${flowState.index>0 ? '<button class="ghost" id="backBtn">Back</button>' : ''}
    </div>
    <div id="statusArea"></div>
  `;

  document.getElementById('nextBtn').onclick = ()=> handleNext(main, flowKey, weeklyDate);
  const backBtn = document.getElementById('backBtn');
  if(backBtn) backBtn.onclick = ()=>{ flowState.index--; renderCheckinFlow(main, flowKey, weeklyDate); };
  const ta = document.getElementById('answerInput');
  ta.focus();
  ta.addEventListener('keydown', e=>{
    if(e.key==='Enter' && (e.metaKey||e.ctrlKey)) handleNext(main, flowKey, weeklyDate);
  });
  setupVoiceInput(ta, document.getElementById('micBtn'));
  main.querySelectorAll('.domain-pill').forEach(btn=>{
    btn.onclick = ()=>{ flowState.domain = btn.dataset.d; renderCheckinFlow(main, flowKey, weeklyDate); };
  });
}

function setupVoiceInput(taEl, btnEl){
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SR){ return; }
  btnEl.style.display = 'flex';
  let listening = false;
  let baseText = '';

  btnEl.onclick = ()=>{
    if(listening){
      stopActiveRecognition();
      return;
    }
    stopActiveRecognition();
    hideVoiceError();
    baseText = taEl.value ? taEl.value.trim()+' ' : '';
    let recognition;
    try{
      recognition = new SR();
    }catch(e){
      showVoiceError("Voice input isn't available in this browser.");
      return;
    }
    activeRecognition = recognition;
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'en-US';
    recognition.onstart = ()=>{ listening = true; btnEl.classList.add('listening'); };
    recognition.onresult = (e)=>{
      let transcript = '';
      for(let i=0;i<e.results.length;i++){ transcript += e.results[i][0].transcript; }
      taEl.value = baseText + transcript;
    };
    recognition.onerror = (e)=>{
      listening = false;
      btnEl.classList.remove('listening');
      if(activeRecognition===recognition) activeRecognition = null;
      const messages = {
        'not-allowed': "Microphone access is blocked. Check your browser or device's site permissions.",
        'permission-denied': "Microphone access is blocked. Check your browser or device's site permissions.",
        'no-speech': "Didn't catch anything — try again.",
        'audio-capture': "No microphone found on this device.",
        'network': "Connection issue reaching voice recognition — try again.",
        'service-not-allowed': "Voice input is blocked in this environment."
      };
      showVoiceError(messages[e.error] || "Voice input hit an error — try again, or just type.");
    };
    recognition.onend = ()=>{ listening = false; btnEl.classList.remove('listening'); if(activeRecognition===recognition) activeRecognition = null; };
    try{
      recognition.start();
    }catch(e){
      showVoiceError("Couldn't start voice input — try again, or just type.");
    }
  };
}
function showVoiceError(msg){
  let el = document.getElementById('voiceError');
  if(!el){
    el = document.createElement('div');
    el.id = 'voiceError';
    el.style.cssText = 'font-size:12px;color:#F0B8C4;margin-top:8px;';
    const wrap = document.querySelector('.answer-wrap');
    if(wrap && wrap.parentNode) wrap.parentNode.insertBefore(el, wrap.nextSibling);
  }
  el.textContent = msg;
}
function hideVoiceError(){
  const el = document.getElementById('voiceError');
  if(el) el.remove();
}

async function handleNext(main, flowKey, weeklyDate){

async function finishFlow(main, flowKey, weeklyDate){
  const flow = FLOWS[flowKey];
  const dateKey = weeklyDate || todayISO();
  const domain = flowState.domain || 'personal';
  const storageKey = flowKey+':'+dateKey + (domain==='business' ? ':business' : '');

  main.innerHTML = `<div class="page-title">Closing it out</div><div class="thinking" style="margin-top:16px;"><span class="spin"></span>Writing your reflection...</div>`;

  const qaPairs = flow.questions.map(q=>({ q: q.q, a: flowState.answers[q.key].refined }));
  const reflection = await getReflection(flow.label, qaPairs);

  const entry = { date: dateKey, type: flowKey, domain: (flowKey==='morning'||flowKey==='evening') ? domain : undefined };
  flow.questions.forEach(q=>{ entry[q.key] = flowState.answers[q.key].refined; });
  entry._reflection = reflection;
  entry._loggedAt = new Date().toISOString();

  checkinsData[storageKey] = entry;
  await saveCheckins();

  flowState.phase = 'complete';
  flowState.reflection = reflection;
  renderCompleteView(main, flow, flowKey, entry, weeklyDate);
}

/* ============================= SHAREABLE OPERATOR CARD ============================= */
function wrapCanvasText(ctx, text, maxWidth){
  const words = text.split(' ');
  const lines = [];
  let line = '';
  for(const w of words){
    const test = line ? line+' '+w : w;
    if(ctx.measureText(test).width > maxWidth && line){ lines.push(line); line = w; }
    else{ line = test; }
  }
  if(line) lines.push(line);
  return lines;
}
function generateOperatorCard(streak, shiftText){
  const canvas = document.createElement('canvas');
  const SIZE = 1080;
  canvas.width = SIZE; canvas.height = SIZE;
  const ctx = canvas.getContext('2d');

  ctx.fillStyle = '#0A0812';
  ctx.fillRect(0,0,SIZE,SIZE);

  ctx.strokeStyle = '#8B7CF6';
  ctx.lineWidth = 5;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(120,700);
  ctx.bezierCurveTo(200,700,220,470,360,470);
  ctx.bezierCurveTo(480,470,440,600,560,600);
  ctx.bezierCurveTo(620,600,630,540,630,540);
  ctx.stroke();
  ctx.fillStyle = '#B8A6FF';
  ctx.beginPath();
  ctx.arc(630,540,11,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle = '#5C5670';
  ctx.font = '600 30px Arial';
  ctx.fillText('MENTAL CLARITY OS', 120, 800);

  ctx.fillStyle = '#EDE9F7';
  ctx.font = '700 190px Arial';
  ctx.fillText(String(streak), 118, 300);
  ctx.fillStyle = '#8B7CF6';
  ctx.font = '600 42px Arial';
  ctx.fillText('DAY STREAK', 124, 350);

  if(shiftText){
    ctx.fillStyle = '#C9C3DE';
    ctx.font = 'italic 34px Georgia';
    const lines = wrapCanvasText(ctx, shiftText, SIZE-240).slice(0,4);
    lines.forEach((line,i)=>{ ctx.fillText(line, 120, 900 + i*44); });
  }

  canvas.toBlob(blob=>{
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'mental-clarity-os-streak.png';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=> URL.revokeObjectURL(url), 3000);
  }, 'image/png');
}

/* ============================= NOTES ============================= */
function renderNotes(main){
  const notes = (appConfig.notes||[]).slice().sort((a,b)=> b.ts.localeCompare(a.ts));
  main.innerHTML = `
    <div class="page-eyebrow">Reference</div>
    <div class="page-title">Notes and observations</div>
    <div class="page-sub voice">Free-form. Insights, patterns, corrections, lessons.</div>
    <div class="card">
      <textarea class="field" id="newNote" placeholder="Write an observation..." style="min-height:80px;"></textarea>
      <div class="btnrow"><button class="primary" id="addNoteBtn">Add note</button></div>
    </div>
    <div class="card" id="notesList" style="${notes.length===0?'display:none':''}"></div>
    ${notes.length===0 ? '' : ''}
  `;
  document.getElementById('addNoteBtn').onclick = async ()=>{
    const ta = document.getElementById('newNote');
    const text = ta.value.trim();
    if(!text) return;
    appConfig.notes.push({ id: Date.now().toString(36), ts: new Date().toISOString(), text });
    await saveConfig();
    renderNotes(main);
  };

  const list = document.getElementById('notesList');
  if(notes.length>0){
    list.innerHTML = notes.map(n=>`
      <div class="note-item">
        <div class="note-date">${new Date(n.ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric', hour:'numeric', minute:'2-digit'})}</div>
        <div class="note-text">${escapeHtml(n.text)}</div>
        <button class="note-del" data-id="${n.id}">Remove</button>
      </div>
    `).join('');
    list.querySelectorAll('.note-del').forEach(btn=>{
      btn.onclick = async ()=>{
        appConfig.notes = appConfig.notes.filter(n=>n.id!==btn.dataset.id);
        await saveConfig();
        renderNotes(main);
      };
    });
  }
}

/* ============================= DATA EXPORT ============================= */
function exportUserData(){
  const lines = [];
  lines.push('MENTAL CLARITY OS — YOUR DATA');
  lines.push('Exported ' + new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}));
  lines.push('='.repeat(50));

  const v = appConfig.vision || {};
  if(v.twelveMonth || v.threeMonth || v.weekMission || v.why || v.identity){
    lines.push('\nLONG-TERM DIRECTION\n' + '-'.repeat(30));
    if(v.identity) lines.push('Identity: ' + v.identity);
    if(v.twelveMonth) lines.push('12-month target: ' + v.twelveMonth);
    if(v.threeMonth) lines.push('3-month focus: ' + v.threeMonth);
    if(v.weekMission) lines.push("This week's mission: " + v.weekMission);
    if(v.why) lines.push('Why this matters: ' + v.why);
  }

  const entries = Object.values(checkinsData).sort((a,b)=> a.date.localeCompare(b.date) || (a._loggedAt||'').localeCompare(b._loggedAt||''));
  if(entries.length){
    lines.push('\n\nCHECK-INS (' + entries.length + ')\n' + '='.repeat(50));
    entries.forEach(e=>{
      const flow = FLOWS[e.type];
      const dateLabel = e.type==='monthly' ? fmtMonth(e.date) : fmtDate(e.date);
      lines.push('\n' + dateLabel + ' — ' + flow.label + (e.domain ? ' (' + e.domain + ')' : ''));
      lines.push('-'.repeat(30));
      flow.questions.forEach(q=>{
        if(e[q.key]) lines.push(q.label + ': ' + e[q.key]);
      });
      if(e._reflection) lines.push('Reflection: ' + e._reflection);
    });
  }

  const notes = appConfig.notes || [];
  if(notes.length){
    lines.push('\n\nNOTES (' + notes.length + ')\n' + '='.repeat(50));
    notes.slice().sort((a,b)=>a.ts.localeCompare(b.ts)).forEach(n=>{
      lines.push('\n' + new Date(n.ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}) + ': ' + n.text);
    });
  }

  const blob = new Blob([lines.join('\n')], {type:'text/plain'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'mental-clarity-os-export-' + todayISO() + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=> URL.revokeObjectURL(url), 3000);
}

/* check reminders every 20s while app open */
let firedReminders = { morning: null, evening: null };
setInterval(()=>{
  if(!storageReady) return;
  const s = appConfig.settings;
  const now = new Date();
  const hhmm = now.toTimeString().slice(0,5);
  const iso = todayISO();

  if(s.morningOn && s.morningTime && hhmm >= s.morningTime && firedReminders.morning !== iso){
    firedReminders.morning = iso;
    if(!checkinsData['morning:'+iso]) fireNotification('Morning check-in', 'Set the standard before the day sets it for you.');
  }
  if(s.eveningOn && s.eveningTime && hhmm >= s.eveningTime && firedReminders.evening !== iso){
    firedReminders.evening = iso;
    if(!checkinsData['evening:'+iso]) fireNotification('Evening review', 'Close the day clean.');
  }
}, 20000);
function fireNotification(title, body){
  if('Notification' in window && Notification.permission==='granted'){
    new Notification(title, { body });
  }
}

/* ============================= UTIL ============================= */
function escapeHtml(str){
  if(!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ============================= AUTH ============================= */
let authMode = 'signin'; // 'signin' | 'signup'
function renderAuth(){
  document.getElementById('sidebar').style.display = 'none';
  const main = document.getElementById('main');
  main.innerHTML = `
    <div id="authWrap">
      <div class="auth-brand">
        <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
          <path d="M3 20C7 20 8 6 13 6C17 6 15 16 19 16C21.5 16 22 12 22 12" stroke="#8B7CF6" stroke-width="1.6" stroke-linecap="round" fill="none"/>
          <circle cx="22" cy="12" r="2.4" fill="#B8A6FF"/>
        </svg>
        <div class="brand-text">Mental Clarity<span>Operating System</span></div>
      </div>
      <div class="auth-title">${authMode==='signin' ? 'Sign in' : 'Create your account'}</div>
      <div class="auth-sub">${authMode==='signin' ? 'Pick up where you left off.' : 'One system, three minutes at a time.'}</div>

      <div class="auth-field-label">Email</div>
      <input class="auth-input" type="email" id="authEmail" placeholder="you@email.com" autocomplete="email">
      <div class="auth-field-label">Password</div>
      <input class="auth-input" type="password" id="authPassword" placeholder="••••••••" autocomplete="${authMode==='signin'?'current-password':'new-password'}">

      <button class="primary" id="authBtn">${authMode==='signin' ? 'Sign in' : 'Create account'}</button>
      <div id="authError" class="auth-error"></div>

      <div class="auth-toggle">
        ${authMode==='signin' ? "Don't have an account? " : 'Already have an account? '}
        <button id="authToggleBtn">${authMode==='signin' ? 'Create one' : 'Sign in'}</button>
      </div>
    </div>
  `;
  document.getElementById('authToggleBtn').onclick = ()=>{ authMode = authMode==='signin' ? 'signup' : 'signin'; renderAuth(); };
  document.getElementById('authBtn').onclick = handleAuthSubmit;
  document.getElementById('authPassword').addEventListener('keydown', e=>{ if(e.key==='Enter') handleAuthSubmit(); });
}
async function handleAuthSubmit(){
  const btn = document.getElementById('authBtn');
  const errEl = document.getElementById('authError');
  const email = document.getElementById('authEmail').value.trim();
  const password = document.getElementById('authPassword').value;
  errEl.textContent = '';
  if(!email || !password){ errEl.textContent = 'Enter both an email and password.'; return; }
  btn.disabled = true;
  btn.textContent = 'One sec...';

  const { data, error } = authMode==='signin'
    ? await supabaseClient.auth.signInWithPassword({ email, password })
    : await supabaseClient.auth.signUp({ email, password });

  if(error){
    errEl.textContent = error.message;
    btn.disabled = false;
    btn.textContent = authMode==='signin' ? 'Sign in' : 'Create account';
    return;
  }
  if(authMode==='signup' && !data.session){
    errEl.textContent = 'Check your email to confirm your account, then sign in.';
    btn.disabled = false;
    btn.textContent = 'Create account';
    authMode = 'signin';
    return;
  }
  currentUser = data.user;
  document.getElementById('sidebar').style.display = '';
  await loadAll();
  render();
}
function signOut(){
  supabaseClient.auth.signOut();
  currentUser = null;
  checkinsData = {};
  appConfig = { vision:{}, notes:[], settings:{morningTime:'', eveningTime:'', morningOn:false, eveningOn:false, domainsEnabled:false}, onboardingComplete:false, manualNonNegotiables:{} };
  currentView = 'home';
  authMode = 'signin';
  renderAuth();
}

/* ============================= INIT ============================= */
(async function init(){
  document.getElementById('main').innerHTML = `<div style="padding-top:60px;color:var(--text-muted);font-size:13.5px;">Loading...</div>`;
  const { data: { session } } = await supabaseClient.auth.getSession();
  if(session){
    currentUser = session.user;
    await loadAll();
    render();
  }else{
    renderAuth();
  }
})();
</script>
